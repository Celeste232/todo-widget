<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Wony's To do</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=20260428d" />
</head>
<body>
  <div class="card">
    <div class="header">
      <h1 class="title">Wony's To do</h1>
      <button id="toggleAddBtn" class="add-toggle" aria-label="할 일 추가" aria-expanded="false">
        <svg class="icon-plus" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>

    <form id="addForm" class="add-row collapsed" autocomplete="off">
      <span class="add-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="7" x2="20" y2="7"></line>
          <line x1="4" y1="12" x2="20" y2="12"></line>
          <line x1="4" y1="17" x2="14" y2="17"></line>
        </svg>
      </span>
      <input
        id="taskInput"
        class="add-input"
        type="text"
        placeholder="Add a new task"
        maxlength="200"
      />
    </form>

    <div class="tabs-row">
      <div class="tabs" role="tablist">
        <button class="tab active" data-filter="all" role="tab">All</button>
        <button class="tab" data-filter="pending" role="tab">Pending</button>
        <button class="tab" data-filter="completed" role="tab">Completed</button>
      </div>
      <button id="clearAllBtn" class="clear-btn">Clear All</button>
    </div>

    <ul id="taskList" class="task-list"></ul>

    <p id="emptyState" class="empty-state" hidden>아직 할 일이 없어 ☕️</p>
  </div>

  <script src="app.js?v=20260428d"></script>
</body>
</html>
